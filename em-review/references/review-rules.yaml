# review-rules.yaml - Mechanical review-selection rule table (em-review SSOT)
#
# Layer 1 (mechanical floor): in standalone use there is usually no declared
# task metadata, so the floor is `baseline` + (`spec` when a SPEC.md is
# discoverable). When the cwd carries an em-workflow
# feature-docs/{feature}/workflow.yaml whose tasks cover the current diff,
# the full table below MAY be evaluated DETERMINISTICALLY against those
# tasks' domains / complexity instead. Input is ONLY the declared metadata —
# never the diff.
#
# Layer 2 (discretionary): the orchestrator may ADD perspectives after looking
# at the diff / file list. It may NEVER remove anything the floor selected.
# Every discretionary addition is recorded in the round record with a reason.
#
# Evaluation semantics:
# - baseline perspectives are always included.
# - A rule fires when ANY of its if_domains values appears in the UNION of
#   all tasks' domains, or when if_complexity matches ANY task's complexity.
# - require lists are unioned; duplicates collapse.
# - spec_review: always → the spec perspective is included whenever a SPEC.md
#   is available; absent, spec is dropped with a skip notice instead.
#
# Codex cross-validation (intensity axis, separate from perspective selection):
# fires when ANY task has complexity: high (workflow.yaml-sourced floor only),
# OR the FINAL selected set (floor + Layer 2 discretionary additions)
# includes security. Layer 1 computes a provisional value from this table;
# the orchestrator re-evaluates it after Layer 2 (review-phase.md R1), so a
# discretionarily-added security perspective also fires it. When it fires,
# each selected perspective that the codex reviewer supports is double-run
# (claude + codex) for agreement scoring.
#
# domains vocabulary (fixed, 8 values):
#   auth / input-handling / data-persistence / external-io / concurrency /
#   api-contract / ui / config-infra
# complexity vocabulary: low / medium / high
#
# This table is expected to GROW through operation. Add rules; keep them
# deterministic; never encode diff-content conditions here (that is Layer 2's
# job).

baseline: [comprehensive]

rules:
  - if_domains: [auth, input-handling]
    require: [security]
  - if_domains: [data-persistence]
    require: [security, performance]
  - if_domains: [concurrency, external-io]
    require: [performance]
  - if_domains: [api-contract]
    require: [architecture]
  - if_complexity: high
    require: [architecture, comprehensive]

spec_review: always

codex_cross_validation:
  when_any:
    - complexity: high
    - selected_perspective: security
